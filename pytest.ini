# pytest.ini
[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_functions = test_*
addopts = -ra --strict-markers
markers =
	db: tests that require a live database connection
	api: tests that require an FMP API key
	integration: integration-level tests that may touch multiple modules or external surfaces
	smoke: fast PR-gate checks
	slow: longer-running tests intended for scheduled runs
	e2e: end-to-end workflow tests intended for scheduled runs
	workflow_backfill: backfill workflow coverage
	workflow_live: live trading workflow coverage
	workflow_backtest: backtesting workflow coverage
	workflow_indicators: indicator workflow coverage
	workflow_nlp: NLP/article workflow coverage
	synthetic: scheduled synthetic monitoring checks outside default pytest gates
filterwarnings =
	error::DeprecationWarning
	error::PendingDeprecationWarning
	error::FutureWarning
