# pytest.ini
[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_functions = test_*
addopts = -ra
markers =
	db: tests that require a live database connection
	api: tests that require an FMP API key
filterwarnings =
	error::DeprecationWarning
	error::PendingDeprecationWarning
	error::FutureWarning
