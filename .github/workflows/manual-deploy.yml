name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (for example: latest or a commit SHA)"
        required: true
        default: "latest"
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate deploy webhook secret
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL secret is not configured."
            exit 1
          fi

      - name: Trigger deployment webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          IMAGE: ghcr.io/${{ github.repository }}:${{ inputs.image_tag }}
          TARGET_ENV: ${{ inputs.environment }}
        run: |
          curl -fsSL -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"repository\":\"${{ github.repository }}\",\"sha\":\"${{ github.sha }}\",\"image\":\"$IMAGE\",\"environment\":\"$TARGET_ENV\"}"

      - name: Deployment trigger sent
        run: |
          echo "Triggered deployment for $IMAGE to $TARGET_ENV"
