name: CI/CD trading sys

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  # [Task] Trigger: pull_request to main
  # This runs CI checks for every PR targeting the main branch.
  pull_request:
    branches:
      - main
  # This runs CD when code is merged (pushed) to main.
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # CI job: validate PRs to main.
    if: github.event_name != 'schedule'
    name: ci (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    permissions:
      contents: read
    
    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false

      # Setup Python runtime
      - name: Set up Python
        id: python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache pytest
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-${{ matrix.python-version }}-${{ hashFiles('pytest.ini', 'pyproject.toml', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pytest-${{ matrix.python-version }}-
            ${{ runner.os }}-pytest-

      # Install dependencies for lint/tests
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir --only-binary :all: -r requirements.txt
          python -m pip install -e .
          python -m pip install ruff pytest pytest-cov pip-audit
    
      # Lint (fast checks)
      - name: Lint (ruff)
        run: |
          python -m ruff check src tests scripts --select E9,F63,F7,F82 

      # Gate tests on DB secrets
      - name: Check DB secrets
        if: matrix.python-version == '3.11'
        id: db
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SSLMODE: ${{ secrets.DB_SSLMODE }}
        run: |
          if [ -n "$DB_HOST" ] && [ -n "$DB_PORT" ] && [ -n "$DB_NAME" ] && [ -n "$DB_USER" ] && [ -n "$DB_PASSWORD" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      # Security scan for Python dependencies.
      # Non-blocking initially to avoid breaking pipelines while triaging findings.
      - name: Security scan (pip-audit)
        if: matrix.python-version == '3.11'
        continue-on-error: true
        run: |
          python -m pip_audit -r requirements.txt

      # Run unit tests (always)
      - name: Run unit tests
        env:
          PYTHONWARNINGS: error
        run: |
          python -m pytest -q -m "not db and not api and not slow and not e2e and not synthetic" \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=json

      # Run integration tests if DB secrets exist
      - name: Run integration tests
        if: matrix.python-version == '3.11' && steps.db.outputs.available == 'true'
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SSLMODE: ${{ secrets.DB_SSLMODE }}
          PYTHONWARNINGS: error
        run: |
          python -m pytest -q -m "db" \
            --cov=src \
            --cov-append \
            --cov-report=term-missing \
            --cov-report=json

      - name: Enforce per-file coverage
        if: matrix.python-version == '3.11'
        run: |
          if [ -f "scripts/check_per_file_coverage.py" ]; then
            python scripts/check_per_file_coverage.py \
              --min 50 \
              --coverage-file coverage.json \
              --include-glob "src/backtest/*.py" \
              --include-glob "src/common/auth/*.py" \
              --include-glob "src/orchestrator/marketData/fmpMarketData.py" \
              --include-glob "src/portfolios/indicators/*.py" \
              --include-glob "src/portfolios/strategy_api.py" \
              --include-glob "src/main_backtest.py"
          else
            echo "scripts/check_per_file_coverage.py not found; skipping per-file coverage enforcement."
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-json-py${{ matrix.python-version }}
          path: coverage.json
          if-no-files-found: warn




      

  build-and-publish:
    # CD job: PR build validation + publish/deploy on main pushes.
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30

    steps:
      # Pull repository code for Docker build.
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check Dockerfile
        # Only build/push if a Dockerfile exists at repo root.
        id: dockerfile
        run: |
          if [ -f "Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        # Buildx enables multi-platform and cached builds.
        if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GHCR
        # Authenticate so we can push the image to GitHub Container Registry.
        if: steps.dockerfile.outputs.exists == 'true' && github.event_name == 'push'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (PR validation)
        # Validate Docker build for PRs without publishing image.
        if: steps.dockerfile.outputs.exists == 'true' && github.event_name == 'pull_request'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          push: false

      - name: Extract metadata
        # Create image tags (latest + commit SHA).
        if: steps.dockerfile.outputs.exists == 'true' && github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        # Build the Docker image and push it to GHCR.
        if: steps.dockerfile.outputs.exists == 'true' && github.event_name == 'push'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Require deployment webhook configuration
        # Enforce real CD: fail when deployment target is not configured.
        if: steps.dockerfile.outputs.exists == 'true' && github.event_name == 'push' && secrets.DEPLOY_WEBHOOK_URL == ''
        run: |
          echo "DEPLOY_WEBHOOK_URL is not configured. CD requires a deployment target." >&2
          exit 1

      - name: Trigger deployment webhook
        # Deploy the newly built image via the configured webhook.
        if: steps.dockerfile.outputs.exists == 'true' && github.event_name == 'push'
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
        run: |
          curl -fsSL -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"repository\":\"${{ github.repository }}\",\"sha\":\"${{ github.sha }}\",\"image\":\"$IMAGE\"}"

      - name: Skip publish (no Dockerfile)
        # Explain why CD didn't run.
        if: steps.dockerfile.outputs.exists != 'true'
        run: |
          echo "Dockerfile not found. Skipping CD publish step."

  synthetic-monitoring:
    name: synthetic-monitoring
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir --only-binary :all: -r requirements.txt

      - name: Synthetic API provider checks
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "Production branch synthetic checks: requiring FMP_API_KEY."
            python scripts/api_test.py --symbol AAPL --require-fmp
          else
            echo "Non-production branch synthetic checks: FMP_API_KEY missing is warning-only."
            python scripts/api_test.py --symbol AAPL
          fi

      - name: Synthetic NLP daemon checks
        run: |
          python NLP/monitor_daemon.py --synthetic --max-log-age-hours 72
